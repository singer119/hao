<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的簡易記帳本</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --accent: #f39c12; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        #submitBtn { background: var(--success); color: white; }
        #settleBtn { background: var(--primary); color: white; margin-top: 10px; }
        
        .result-item { background: #fff9e6; border-left: 5px solid var(--accent); padding: 10px; margin-top: 10px; border-radius: 4px; position: relative; }
        .copy-btn { position: absolute; right: 10px; top: 10px; background: #eee; border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; border-radius: 4px; width: auto; }
        .profit-info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 新增帳目</h2>
    <form id="ledgerForm">
        <div class="form-group">
            <label>1. 日期</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>2. 人名</label>
            <input type="text" id="name" placeholder="輸入姓名" required>
        </div>
        <div class="form-group">
            <label>3. 品名</label>
            <input type="text" id="item" placeholder="例如：黃水晶" required>
        </div>
        <div class="form-group">
            <label>4. 售價</label>
            <input type="number" id="amount" placeholder="銷售金額" required>
        </div>
        <div class="form-group">
            <label>5. 成本</label>
            <input type="number" id="cost" placeholder="進貨成本" required>
        </div>
        <button type="submit" id="submitBtn">確認送出</button>
    </form>
</div>

<div class="card">
    <h2>📊 今日結算</h2>
    <button id="settleBtn">點擊計算今日業績</button>
    <div id="settleArea"></div>
</div>

<script>
    // --- 這裡貼上你的 GAS 網址 ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwHoBkWFatIs3GzQrMLnpWL4_g04JlLa-KTuNXvJVoWiD3IMiPUR3gCJncsDWpS_sqo6Q/exec'; 

    // 預設日期為今天
    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;
    };

    // 1. 送出表單
    const form = document.getElementById('ledgerForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '傳送中...';

        const data = {
            date: document.getElementById('date').value,
            name: document.getElementById('name').value,
            item: document.getElementById('item').value,
            amount: document.getElementById('amount').value,
            cost: document.getElementById('cost').value
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            alert('寫入成功！');
            form.reset();
            // 重置後再次帶入今天日期
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            btn.disabled = false;
            btn.innerText = '確認送出';
        }).catch(() => {
            alert('出錯了，請檢查設定');
            btn.disabled = false;
        });
    });

    // 2. 結算功能
    document.getElementById('settleBtn').addEventListener('click', () => {
        const area = document.getElementById('settleArea');
        area.innerHTML = '讀取中...';
        
        fetch(scriptURL) // 發送 GET 請求
        .then(res => res.json())
        .then(summary => {
            area.innerHTML = '';
            if (Object.keys(summary).length === 0) {
                area.innerHTML = '今日尚無帳目';
                return;
            }

            for (let name in summary) {
                const info = summary[name];
                const itemString = info.items.join(' + ');
                // 格式化：王小名 黃水晶 100 + 紫水晶 150 = 💰台幣 【 250 】 元 已入帳
                const copyText = `${name}：${itemString} = 💰台幣 【 ${info.total} 】 元 已入帳`;

                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <strong>${name}</strong><br>
                    ${itemString} = 💰${info.total}<br>
                    <button class="copy-btn" onclick="copyToClipboard('${copyText}')">複製文字</button>
                `;
                area.appendChild(div);
            }
        });
    });

    // 複製到剪貼簿功能
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('已複製入帳格式！');
        });
    }
</script>

</body>
</html>
