<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人記帳系統 v4.3</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --accent: #f39c12; --yesterday: #3498db; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 60px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; }
        #loginInput { padding: 12px; border-radius: 8px; border:none; margin-bottom: 15px; width: 220px; text-align: center; font-size: 18px; outline: none; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 8px; font-size: 16px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        .name-container { position: relative; width: 100%; }
        .name-container::after { content: "▼"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 10px; pointer-events: none; }
        #name { padding-right: 30px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        #submitBtn { background: var(--success); }
        .refresh-btn { background: #f8f9fa; color: #666; font-size: 12px; padding: 4px 10px; width: auto; border: 1px solid #ddd; }
        .result-item { background: #fff9e6; border-left: 5px solid var(--accent); padding: 12px; margin-top: 10px; border-radius: 6px; position: relative; text-align: left; }
        .summary-name { font-size: 16px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 4px; }
        .summary-content { font-size: 14px; color: #333; display: block; padding-right: 65px; line-height: 1.4; }
        .copy-btn { position: absolute; right: 10px; bottom: 10px; background: #fff; color: #333; border: 1px solid #ccc; padding: 5px 10px; font-size: 12px; border-radius: 6px; width: auto; }
        .total-box { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc; font-size: 15px; text-align: right; }
        .total-row { color: var(--primary); font-weight: bold; }
        #historyPanel { display:none; background:#fff; border-top: 2px solid var(--primary); padding-top: 15px; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .btn-mini { width: auto; padding: 5px 8px; font-size: 12px; border-radius: 4px; margin-left: 5px; }
        .btn-edit { background: var(--accent); }
        .btn-del { background: var(--danger); }
        .add-name-area { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #d0e3f7; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2>🔒 雲端權限驗證</h2>
    <input type="password" id="loginInput" placeholder="請輸入存取密碼">
    <button id="loginBtn" onclick="checkPassword()" style="width:220px; background:var(--success)">登入系統</button>
</div>

<div id="mainContent" class="hidden">
    <div class="card">
        <h2>📝 新增帳目</h2>
        <form id="ledgerForm">
            <div class="form-group"><label>1. 日期</label><input type="date" id="date" required></div>
            <div class="form-group"><label>2. 姓名 (點擊選單或打字)</label><div class="name-container"><input type="text" id="name" list="nameList" placeholder="點擊顯示熟客名單" required autocomplete="off"></div><datalist id="nameList"></datalist></div>
            <div class="form-group"><label>3. 品名</label><input type="text" id="item" placeholder="例如：金運手串" required></div>
            <div class="form-group"><label>4. 售價</label><input type="number" id="amount" placeholder="請輸入銷售金額" required></div>
            <div class="form-group"><label>5. 成本</label><input type="number" id="cost" placeholder="請輸入進貨成本" required></div>
            <button type="submit" id="submitBtn">確認送出資料</button>
        </form>
    </div>

    <div class="card"><h3 style="color:var(--primary)">📅 今日結算 <button class="refresh-btn" onclick="loadSettle(0, 'todayArea')">🔄 刷新</button></h3><div id="todayArea"></div></div>
    <div class="card"><h3 style="color:var(--yesterday)">📅 昨日結算 <button class="refresh-btn" onclick="loadSettle(1, 'yesterdayArea')">🔄 刷新</button></h3><div id="yesterdayArea"></div></div>

    <div class="card">
        <button id="toggleHistoryBtn" onclick="toggleHistory()" style="background:var(--primary)">🛠️ 開啟紀錄管理 & 名單新增</button>
        <div id="historyPanel">
            <div class="add-name-area">
                <label style="font-size:13px; font-weight:bold; color:#2980b9; display:block; margin-bottom:8px;">👤 快速新增熟客名單</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newNameInput" placeholder="輸入熟客姓名" style="padding:8px; font-size:14px;">
                    <button onclick="addNewName()" style="width:auto; background:#2980b9; padding:8px 15px; font-size:14px;">新增</button>
                </div>
            </div>
            <div id="historyList">讀取中...</div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxZAWkrkAf0DhUnYZw7akJx3Ex2LR0dx1RvolTm02R21Amf8GIQ3w030HesnOEo_LtdGw/exec'; 
    let userPwd = '';

    function checkPassword() {
        const input = document.getElementById('loginInput').value;
        const btn = document.getElementById('loginBtn');
        if(!input) return;
        btn.innerText = '驗證中...'; btn.disabled = true;
        fetch(`${scriptURL}?pwd=${encodeURIComponent(input)}&date=test`).then(res => res.json()).then(res => {
            if (res.auth === true) {
                userPwd = input;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
                if(res.names) updateNameList(res.names);
                initData();
            } else { alert('密碼錯誤！'); btn.innerText = '登入系統'; btn.disabled = false; }
        }).catch(() => { alert('連線失敗'); btn.innerText = '登入系統'; btn.disabled = false; });
    }

    function updateNameList(names) {
        const list = document.getElementById('nameList');
        list.innerHTML = '';
        names.sort().forEach(n => { const opt = document.createElement('option'); opt.value = n; list.appendChild(opt); });
    }

    function addNewName() {
        const name = document.getElementById('newNameInput').value;
        if (!name) return;
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ method: 'ADD_NAME', newName: name }) }).then(() => {
            alert('名單新增成功！');
            document.getElementById('newNameInput').value = '';
            const list = document.getElementById('nameList');
            const opt = document.createElement('option'); opt.value = name; list.appendChild(opt);
        });
    }

    document.getElementById('name').addEventListener('click', function() { this.value = ''; });

    function initData() {
        document.getElementById('date').value = new Date().toLocaleDateString('en-CA');
        loadSettle(0, 'todayArea'); loadSettle(1, 'yesterdayArea');
    }

    const form = document.getElementById('ledgerForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = '傳送中...';
        const data = { date: document.getElementById('date').value, name: document.getElementById('name').value, item: document.getElementById('item').value, amount: document.getElementById('amount').value, cost: document.getElementById('cost').value };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }).then(() => {
            alert('寫入成功'); form.reset(); initData();
            btn.disabled = false; btn.innerText = '確認送出資料';
            loadSettle(0, 'todayArea');
        });
    });

    function toggleHistory() {
        const panel = document.getElementById('historyPanel');
        const btn = document.getElementById('toggleHistoryBtn');
        if (panel.style.display === 'block') { panel.style.display = 'none'; btn.innerText = '🛠️ 開啟紀錄管理 & 名單新增'; }
        else { panel.style.display = 'block'; btn.innerText = '✖️ 關閉紀錄管理'; loadHistory(); }
    }

    function loadHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '讀取最新紀錄中...';
        fetch(`${scriptURL}?pwd=${encodeURIComponent(userPwd)}&action=getHistory`).then(res => res.json()).then(res => {
            list.innerHTML = '';
            res.history.forEach(item => {
                const div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `<div class="history-info"><strong>${item.date} | ${item.name}</strong><br>${item.item} ($${item.amount})</div><div><button class="btn-mini btn-edit" onclick="editRow(${item.row},'${item.date}','${item.name}','${item.item}',${item.amount},${item.cost})">改</button><button class="btn-mini btn-del" onclick="deleteRow(${item.row})">刪</button></div>`;
                list.appendChild(div);
            });
        });
    }

    function deleteRow(row) { if(!confirm('確定刪除？')) return; fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ method: 'DELETE', row: row }) }).then(() => { loadHistory(); loadSettle(0, 'todayArea'); }); }

    function editRow(row, d, n, i, a, c) {
        const nN = prompt('人名:', n); if (nN === null) return;
        const nI = prompt('品名:', i), nA = prompt('售價:', a), nC = prompt('成本:', c);
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ method: 'EDIT', row: row, date: d, name: nN, item: nI, amount: nA, cost: nC }) }).then(() => { loadHistory(); loadSettle(0, 'todayArea'); });
    }

    function loadSettle(offset, areaId) {
        const area = document.getElementById(areaId); area.innerHTML = '讀取中...';
        const targetDate = new Date(); targetDate.setDate(targetDate.getDate() - offset);
        const dateStr = targetDate.toLocaleDateString('en-CA');
        fetch(`${scriptURL}?pwd=${encodeURIComponent(userPwd)}&date=${dateStr}`).then(res => res.json()).then(res => {
            if (!res.auth) return;
            area.innerHTML = '';
            let total = 0, has = false;
            for (let name in res.data) {
                has = true; const info = res.data[name];
                const formatted = info.items.map(str => str.replace(/\s+/g, '')).join(' + ');
                const div = document.createElement('div'); div.className = 'result-item';
                div.innerHTML = `<span class="summary-name">${name}</span><span class="summary-content">${formatted} = 合計${info.total}</span><button class="copy-btn" onclick="copyToClipboard('${name} ${formatted} = 合計${info.total}')">複製</button>`;
                area.appendChild(div);
                total += info.total;
            }
            if (has) {
                const totalDiv = document.createElement('div'); totalDiv.className = 'total-box';
                totalDiv.innerHTML = `<div class="total-row">💰 今日總收：$ ${total}</div>`;
                area.appendChild(totalDiv);
            } else { area.innerHTML = '<div style="color:#999; text-align:center;">尚無帳目</div>'; }
        });
    }

    function copyToClipboard(text) { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('已複製'); }
</script>
</body>
</html>
